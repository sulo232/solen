<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>solen.ch 芒聙聯 Basel Beauty Booking</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF;
  --surface: #FFFFFF;
  --border: #E0E0E0;
  --text: #111111;
  --muted: #666666;
  --accent: #111111;
  --accent-light: #F5F5F5;
  --accent-mid: #333333;
  --gold: #111111;
  --green: #1A7A38;
  --red: #CC0000;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.03);
  --shadow: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.08), 0 4px 8px rgba(0,0,0,0.04);
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* 芒聰聙芒聰聙 NAV 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-logo {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.nav-logo span { color: var(--accent-mid); }
.nav-right { display: flex; gap: 10px; align-items: center; }
.lang-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 11px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.78rem;
  font-weight: 500;
  transition: all 0.15s;
}
.lang-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.lang-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }
.btn {
  padding: 9px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 500;
  border: none;
  transition: all 0.15s;
  font-family: inherit;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-mid); }
.btn-outline { background: none; border: 1.5px solid var(--accent); color: var(--accent); }
.btn-outline:hover { background: var(--accent-light); }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--text); }
.btn-ghost:hover { background: var(--bg); }
.btn-danger { background: none; border: 1px solid #FCA5A5; color: var(--red); }
.btn-danger:hover { background: #FEF2F2; }
.btn-gold { background: var(--gold); color: #000; font-weight: 600; }
.btn-gold:hover { filter: brightness(1.05); }
.btn-sm { padding: 5px 12px; font-size: 0.8rem; }

/* 芒聰聙芒聰聙 HERO 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.hero {
  background: #FFFFFF;
  border-bottom: 1px solid var(--border);
  padding: 60px 24px 48px;
  text-align: center;
}
.hero-content { max-width: 600px; margin: 0 auto; }
.hero-eyebrow {
  display: inline-block;
  background: #F5F5F5;
  color: #666666;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 18px;
  border: 1px solid #E0E0E0;
}
.hero h1 {
  color: #111111;
  font-size: 2.6rem;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: 14px;
}
.hero h1 em { color: #111111; font-style: normal; text-decoration: underline; text-decoration-thickness: 3px; }
.hero p {
  color: #555555;
  font-size: 1.05rem;
  line-height: 1.6;
  font-weight: 300;
}

/* 芒聰聙芒聰聙 FILTERS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.filters {
  padding: 24px 24px 8px;
  display: flex;
  gap: 8px;
  max-width: 1200px;
  margin: 0 auto;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 8px 18px;
  border-radius: 50px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
  transition: all 0.15s;
  font-family: inherit;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filter-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.25);
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 0.7rem;
  margin-left: 4px;
}
.filter-btn.active .filter-count { background: rgba(255,255,255,0.2); }

/* 芒聰聙芒聰聙 GRID 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.grid-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 24px 60px;
}
.grid-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.grid-count { font-size: 0.85rem; color: var(--muted); font-weight: 400; }
.store-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

/* 芒聰聙芒聰聙 CARD 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-3px);
  border-color: transparent;
}
.card-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}
.card-placeholder {
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  position: relative;
  overflow: hidden;
}
.card-placeholder.hair {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
.card-placeholder.barber {
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
}
.card-placeholder.nails {
  background: linear-gradient(135deg, #f093fb 0%, #c471ed 50%, #f64f59 100%);
}
.card-placeholder-icon {
  font-size: 3.5rem;
  opacity: 0.9;
}
.card-body { padding: 16px 18px 18px; }
.card-cat-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.cat-badge {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
}
.cat-badge.hair { background: #EDE9FE; color: #5B21B6; }
.cat-badge.barber { background: #DBEAFE; color: #1D4ED8; }
.cat-badge.nails { background: #FCE7F3; color: #BE185D; }
.online-badge {
  font-size: 0.7rem;
  color: var(--green);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}
.online-badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  display: inline-block;
}
.card-name { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
.card-addr { font-size: 0.82rem; color: var(--muted); display: flex; align-items: flex-start; gap: 5px; line-height: 1.4; }
.card-addr svg { flex-shrink: 0; margin-top: 1px; }

/* 芒聰聙芒聰聙 OVERLAY / MODAL 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
}
.modal-header {
  padding: 20px 24px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.modal-title { font-size: 1.15rem; font-weight: 600; }
.modal-close {
  background: var(--bg);
  border: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.1rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  flex-shrink: 0;
}

/* 芒聰聙芒聰聙 DETAIL MODAL 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.detail-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  margin-bottom: 20px;
}
.detail-gallery img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; cursor: pointer; }
.detail-hero-placeholder {
  height: 180px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  margin-bottom: 20px;
}
.info-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.info-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.82rem;
  color: var(--text);
  text-decoration: none;
  transition: all 0.15s;
}
.info-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.section-label {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin: 20px 0 10px;
}
.services-list { display: flex; flex-direction: column; gap: 8px; }
.service-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.service-name { font-size: 0.9rem; font-weight: 500; }
.service-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
.service-price { font-weight: 600; font-size: 0.9rem; color: var(--accent); white-space: nowrap; }
.hours-grid {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 6px 12px;
  font-size: 0.85rem;
}
.hours-grid .day-label { color: var(--muted); font-weight: 500; }
.hours-grid .day-hours { color: var(--text); }
.hours-grid .closed { color: var(--muted); font-style: italic; }
.desc-text { font-size: 0.875rem; color: var(--muted); line-height: 1.65; margin-bottom: 16px; }

/* 芒聰聙芒聰聙 AUTH MODAL 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.auth-modal { max-width: 420px; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 2px solid var(--border); }
.auth-tab {
  flex: 1; padding: 10px; text-align: center;
  cursor: pointer; font-size: 0.9rem; font-weight: 500;
  color: var(--muted); border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all 0.15s; background: none; border-left: none; border-right: none; border-top: none;
  font-family: inherit;
}
.auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.google-btn {
  width: 100%;
  padding: 11px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: white;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.15s;
  font-family: inherit;
  color: var(--text);
  margin-bottom: 20px;
}
.google-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; color: var(--muted); font-size: 0.8rem; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* 芒聰聙芒聰聙 FORMS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--text); margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 0.875rem;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  transition: border-color 0.15s;
  outline: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.error-msg {
  background: #FEF2F2;
  border: 1px solid #FECACA;
  color: var(--red);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.82rem;
  margin-bottom: 14px;
  display: none;
}
.checkbox-row { display: flex; align-items: center; gap: 8px; }
.checkbox-row input { width: auto; }
.checkbox-row label { margin: 0; font-size: 0.875rem; }

.booking-modal { max-width: 480px; }

function updateAuthArea() {
  const area = document.getElementById('authArea');
  if (currentUser) {
    const initials = (currentUser.email || 'U').slice(0,2).toUpperCase();
    area.innerHTML = `
      <div class="user-menu-wrap">
        <button class="user-avatar" onclick="document.getElementById('userMenu').classList.toggle('open')">${initials}</button>
        <div class="user-menu" id="userMenu">
          <div class="user-menu-email">${currentUser.email || ''}</div>
          ${ADMIN_EMAILS.includes(currentUser.email) ? `<button class="user-menu-item" onclick="toggleAdmin();document.getElementById('userMenu').classList.remove('open')">${t('admin')}</button>` : ''}
          <button class="user-menu-item danger" onclick="signOut()">${t('signout')}</button>
        </div>
      </div>`;
  } else {
    area.innerHTML = `<button class="btn btn-primary" onclick="openAuth()">${t('signin')}</button>`;
  }
}

function initAuth() {
  sb.auth.getSession().then(({ data }) => {
    currentUser = data.session?.user || null;
    updateAuthArea();
    if (ADMIN_EMAILS.includes(currentUser?.email)) showAdminPanel();
  });
  sb.auth.onAuthStateChange((_ev, session) => {
    currentUser = session?.user || null;
    updateAuthArea();
    if (ADMIN_EMAILS.includes(currentUser?.email)) { showAdminPanel(); loadAdminTable(); }
    else hideAdminPanel();
  });
}

function showAdminPanel() { document.getElementById('adminPanel').style.display = 'block'; loadAdminTable(); }
function hideAdminPanel() { document.getElementById('adminPanel').style.display = 'none'; }
function toggleAdmin() {
  const p = document.getElementById('adminPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  if (p.style.display === 'block') loadAdminTable();
}

async function signOut() {

async function loadStores() {
  const { data, error } = await sb.from('stores').select('*').order('name');
  if (error) {
    document.getElementById('storeGrid').innerHTML = `<div class="loading-state">Fehler beim Laden: ${error.message}</div>`;
    return;
  }
  stores = data || [];
  updateCounts();
  renderGrid();
}

function updateCounts() {
  document.getElementById('cnt-all').textContent = stores.length;
  document.getElementById('cnt-hair').textContent = stores.filter(s => s.cat === 'hair').length;
  document.getElementById('cnt-barber').textContent = stores.filter(s => s.cat === 'barber').length;
  document.getElementById('cnt-nails').textContent = stores.filter(s => s.cat === 'nails').length;
}

function renderGrid() {
  const grid = document.getElementById('storeGrid');
  const filtered = currentFilter === 'all' ? stores : stores.filter(s => s.cat === currentFilter);
  const count = document.getElementById('gridCount');
  count.textContent = `${filtered.length} ${filtered.length === 1 ? t('result') : t('results')}`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="loading-state">${t('noStores')}</div>`;
    return;
  }

  const catIcons = { hair: '芒聹聜茂赂聫', barber: '冒聼聮聢', nails: '冒聼聮聟' };
  const catLabels = { hair: t('catHair'), barber: t('catBarber'), nails: t('catNails') };

  grid.innerHTML = filtered.map(s => {
    const imgHtml = s.photos && s.photos.length > 0
      ? `<img class="card-img" src="${s.photos[0]}" alt="${s.name}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\"card-placeholder ${s.cat}\\"><div class=\\"card-placeholder-icon\\">${catIcons[s.cat]||'芒聹聜茂赂聫'}</div></div>'">`
      : `<div class="card-placeholder ${s.cat}"><div class="card-placeholder-icon">${catIcons[s.cat]||'芒聹聜茂赂聫'}</div></div>`;

    return `<div class="card" onclick="openDetail(${s.id})">
      ${imgHtml}
      <div class="card-body">
        <div class="card-cat-row">
          <span class="cat-badge ${s.cat}">${catLabels[s.cat] || s.cat}</span>
          ${s.registered ? `<span class="online-badge">${t('online')}</span>` : ''}
        </div>
        <div class="card-name">${s.name}</div>
        ${s.address ? `<div class="card-addr"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 21s-8-7.5-8-12a8 8 0 0 1 16 0c0 4.5-8 12-8 12z"/><circle cx="12" cy="9" r="2.5"/></svg>${s.address}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('f-' + f)?.classList.add('active');

function openDetail(id) {
  currentStore = stores.find(s => s.id === id);
  if (!currentStore) return;
  const s = currentStore;
  document.getElementById('detailName').textContent = s.name;
  const body = document.getElementById('detailBody');

  const catIcons = { hair: '芒聹聜茂赂聫', barber: '冒聼聮聢', nails: '冒聼聮聟' };
  const catLabels = { hair: t('catHair'), barber: t('catBarber'), nails: t('catNails') };

  // Gallery or placeholder
  let mediaHtml = '';
  if (s.photos && s.photos.length > 0) {
    mediaHtml = `<div class="detail-gallery">${s.photos.map(p => `<img src="${p}" alt="foto" onclick="window.open('${p}')" onerror="this.style.display='none'">`).join('')}</div>`;
  } else {
    mediaHtml = `<div class="detail-hero-placeholder card-placeholder ${s.cat}" style="margin-bottom:20px"><span style="font-size:4rem">${catIcons[s.cat]||'芒聹聜茂赂聫'}</span></div>`;
  }

  // Cat badge
  const badge = `<span class="cat-badge ${s.cat}" style="margin-bottom:14px;display:inline-block">${catLabels[s.cat] || s.cat}</span>`;

  // Info chips
  let chips = `<div class="info-chips">`;
  if (s.address) chips += `<a class="info-chip" href="https://maps.google.com/?q=${encodeURIComponent(s.addressy}" target="_blank">冒聼聯聧 ${s.address}</a>`;
  if (s.phone) chips += `<a class="info-chip" href="tel:${s.phone}">冒聼聯聻 ${s.phone}</a>`;
  if (s.website) chips += `<a class="info-chip" href="${s.website.startsWith('http') ? s.website : 'https://'+s.website}" target="_blank" rel="noopener">冒聼聦聬 Website</a>`;
  if (s.insta) chips += `<a class="info-chip" href="https://instagram.com/${s.insta.replace('@','')}" target="_blank" rel="noopener">冒聼聯赂 ${s.insta}</a>`;
  chips += `</div>`;

  // Description
  const desc = (lang === 'en' && s.description_en) ? s.description_en : (s.description || '');
  const descHtml = desc ? `<p class="desc-text">${desc}</p>` : '';

  // Services
  let servicesHtml = '';
  if (s.services && s.services.length > 0) {
    servicesHtml = `<div class="section-label">${t('services')}</div><div class="services-list">
    ${s.services.map(sv => `<div class="service-row">
      <div><div class="service-name">${lang === 'en' && sv.nameEN ? sv.nameEN : sv.name}</div>${sv.duration ? `<div class="service-meta">${sv.duration}</div>` : ''}</div>
      ${sv.price ? `<div class="service-price">${sv.price}</div>` : ''}
    </div>`).join('')}</div>`;
  }

  // Hours
  let hoursHtml = '';
  if (s.hours && Object.keys(s.hours).length > 0) {
    const keys = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const labels = t('days');
    hoursHtml = `<div class="section-label" style="margin-top:20px">${t('hours')}</div><div class="hours-grid">`;
    keys.forEach((k, i) => {
      const val = s.hours[k];
      hoursHtml += `<div class="day-label">${labels[i]}</div><div class="${val ? 'day-hours' : 'closed'}">${val || t('closed')}</div>`;
    });
    hoursHtml += '</div>';
  }

  body.innerHTML = mediaHtml + badge + chips + descHtml + servicesHtml + hoursHtml;

  const bookBtn = document.getElementById('bookBtn');
  if (bookBtn) bookBtn.style.display = s.registered ? 'block' : 'none';
  document.getElementById('detailOverlay').classList.add('open');
}

function openBooking() {
  if (!currentStore) return;
  closeDetail();
  document.getElementById('bookingTitle').textContent = currentStore.name;
  document.getElementById('bookingError').style.display = 'none';
  if (currentUser) document.getElementById('bookEmail').value = currentUser.email || '';
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('bookDate').min = today;
  document.getElementById('bookDate').value = today;
  const sel = document.getElementById('bookService');
  sel.innerHTML = '';
  if (currentStore.services?.length > 0) {
    currentStore.services.forEach(sv => {
      const o = document.createElement('option');
      o.value = sv.name;
      o.textContent = (lang === 'en' && sv.nameEN ? sv.nameEN : sv.name) + (sv.price ? ' 芒聙聰 ' + sv.price : '');
      sel.appendChild(o);
    });
  } else {
    sel.innerHTML = '<option>' + (lang === 'de' ? 'Allgemeine Buchung' : 'General booking') + '</option>';
  }
  document.getElementById('bookingOverlay').classList.add('open');
}
function closeBooking() { document.getElementById('bookingOverlay').classList.remove('open'); }

async function submitBooking() {
  const name = document.getElementById('bookName').value.trim();
  const email = document.getElementById('bookEmail').value.trim();
  const service = document.getElementById('bookService').value;
  const date = document.getElementById('bookDate').value;
  const time = document.getElementById('bookTime').value;
  const errEl = document.getElementById('bookingError');
  if (!name || !email || !date) {
    errEl.textContent = lang === 'de' ? 'Bitte alle Pflichtfelder ausf脙录llen.' : 'Please fill in all required fields.';
    errEl.style.display = 'block';
    return;
  }
  const { error } = await sb.from('bookings').insert({
    store_id: currentStore.id, store_name: currentStore.name,
    customer_name: name, customer_email: email,
    service_name: service, booking_date: date, booking_time: time, status: 'pending'
  });
  if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
  closeBooking();
  showToast(lang === 'de' ? '冒聼聨聣 Termin gebucht!' : '冒聼聨聣 Appointment booked!', 'success');

async function loadAdminTable() {
  const { data } = await sb.from('stores').select('*').order('name');
  stores = data || [];
  updateCounts();
  renderGrid();
  const catLabels = { hair: t('catHair'), barber: t('catBarber'), nails: t('catNails') };

async function deleteStore(id) {
  if (!confirm(lang === 'de' ? 'Wirklich l脙露schen?' : 'Really delete?')) return;
  const { error } = await sb.from('stores').delete().eq('id', id);
  if (error) { showToast(error.message, 'error'); return; }
  showToast(t('deleted'), 'success');
  loadAdminTable();
}

// 芒聰聙芒聰聙芒聰聙 STORE EDITOR 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function openStoreModal(id) {
  document.getElementById('userMenu')?.classList.remove('open');
  switchTab('tabBasic', document.querySelector('#storeEditorOverlay .tab'));
  if (id === null) {
    document.getElementById('storeEditorTitle').textContent = lang === 'de' ? 'Neues Gesch脙陇ft' : 'New Store';
    document.getElementById('editStoreId').value = '';
    ['eName','eAddress','ePhone','eWebsite','eInsta','eDesc','eDescEn','eOwnerEmail','ePhotos'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
    document.getElementById('eCat').value = 'hair';
    document.getElementById('eRegistered').checked = false;
    renderServiceRows([]); renderHourRows({});
  } else {
    const s = stores.find(x => x.id === id);
    if (!s) return;
    document.getElementById('storeEditorTitle').textContent = lang === 'de' ? 'Gesch脙陇ft bearbeiten' : 'Edit Store';
    document.getElementById('editStoreId').value = s.id;
    document.getElementById('eName').value = s.name || '';
    document.getElementById('eCat').value = s.cat || 'hair';
    document.getElementById('eAddress').value = s.address || '';
    document.getElementById('ePhone').value = s.phone || '';
    document.getElementById('eWebsite').value = s.website || '';
    document.getElementById('eInsta').value = s.insta || '';
    document.getElementById('eDesc').value = s.description || '';
    document.getElementById('eDescEn').value = s.description_en || '';
    document.getElementById('eOwnerEmail').value = s.owner_email || '';
    document.getElementById('eRegistered').checked = s.registered || false;
    document.getElementById('ePhotos').value = (s.photos || []).join('\n');
    renderServiceRows(s.services || []);
    renderHourRows(s.hours || {});
  }
  document.getElementById('storeEditorOverlay').classList.add('open');
}
function closeStoreEditor() { document.getElementById('storeEditorOverlay').classList.remove('open'); }

function renderServiceRows(services) {
  document.getElementById('servicesList').innerHTML = services.map((sv, i) => serviceRowHtml(i, sv)).join('');
}
function serviceRowHtml(i, sv = {}) {
  return `<div class="form-row" style="margin-bottom:8px;align-items:end" id="srow${i}">
    <div class="form-group" style="margin:0"><label style="font-size:0.75rem">Name DE</label><input type="text" value="${sv.name||''}" class="sname"></div>
    <div class="form-group" style="margin:0"><label style="font-size:0.75rem">Name EN</label><input type="text" value="${sv.nameEN||''}" class="snameEN"></div>
    <div class="form-group" style="margin:0"><label style="font-size:0.75rem">Dauer</label><input type="text" value="${sv.duration||''}" class="sduration" placeholder="45 Min"></div>
    <div class="form-group" style="margin:0"><label style="font-size:0.75rem">Preis</label><input type="text" value="${sv.price||''}" class="sprice" placeholder="CHF 60"></div>
    <button class="btn btn-sm btn-danger" onclick="this.closest('.form-row').remove()">脙聴</button>
  </div>`;
}
function addServiceRow() {
  const list = document.getElementById('servicesList');
  const div = document.createElement('div');
  div.innerHTML = serviceRowHtml(Date.now());
  list.appendChild(div.firstElementChild);
}
function getServicesFromForm() {
  return Array.from(document.querySelectorAll('#servicesList .form-row')).map(row => ({
    name: row.querySelector('.sname')?.value || '',
    nameEN: row.querySelector('.snameEN')?.value || '',
    duration: row.querySelector('.sduration')?.value || '',
    price: row.querySelector('.sprice')?.value || ''
  })).filter(s => s.name);
}
function renderHourRows(hours) {
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const labels = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
  document.getElementById('hoursList').innerHTML = days.map((d, i) => `
    <div class="form-row" style="align-items:center;margin-bottom:8px;grid-template-columns:100px 1fr">
      <div class="form-group" style="margin:0"><label style="font-size:0.8rem;color:var(--muted);margin:0;padding-top:6px">${labels[i]}</label></div>
      <div class="form-group" style="margin:0"><input type="text" class="hday" data-day="${d}" placeholder="09:00-18:30" value="${hours[d]||''}"></div>
    </div>`).join('');
}
function getHoursFromForm() {
  const h = {};
  document.querySelectorAll('.hday').forEach(inp => { if (inp.value.trim()) h[inp.dataset.day] = inp.value.trim(); });
  return h;
}
async function saveStore() {
  const id = document.getElementById('editStoreId').value;
  const data = {
    name: document.getElementById('eName').value.trim(),
    cat: document.getElementById('eCat').value,
    address: document.getElementById('eAddress').value.trim(),
    phone: document.getElementById('ePhone').value.trim(),
    website: document.getElementById('eWebsite').value.trim(),
    insta: document.getElementById('eInsta').value.trim(),
    description: document.getElementById('eDesc').value.trim(),
    description_en: document.getElementById('eDescEn').value.trim(),
    owner_email: document.getElementById('eOwnerEmail').value.trim(),
    registered: document.getElementById('eRegistered').checked,
    services: getServicesFromForm(),
    hours: getHoursFromForm(),
    photos: document.getElementById('ePhotos').value.split('\n').map(s => s.trim()).filter(Boolean)
  };
  if (!data.name) { showToast(lang === 'de' ? 'Name ist Pflicht' : 'Name is required', 'error'); return; }
  const { error } = id
    ? await sb.from('stores').update(data).eq('id', id)
    : await sb.from('stores').insert(data);
  if (error) { showToast(error.message, 'error'); return; }
  closeStoreEditor();
  showToast(t('saved'), 'success');
  loadAdminTable();
}
