<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>solen.ch – Basel Beauty Booking</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --gold: #c8a96e;
  --dark: #0f0f0f;
  --card: #1a1a1a;
  --border: #2a2a2a;
  --text: #e8e0d0;
  --muted: #888;
  --green: #4caf50;
  --red: #e53935;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--dark); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; }

/* NAV */
nav {
  background: #111;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-logo { font-size: 1.5rem; color: var(--gold); letter-spacing: 2px; font-weight: bold; }
.nav-right { display: flex; gap: 12px; align-items: center; }
.lang-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.8rem;
}
.lang-btn.active { border-color: var(--gold); color: var(--gold); }
.btn {
  padding: 8px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
  border: none;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn-gold { background: var(--gold); color: #000; font-weight: bold; }
.btn-outline { background: none; border: 1px solid var(--gold); color: var(--gold); }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--text); }
.btn-danger { background: var(--red); color: #fff; }
.btn-sm { padding: 5px 12px; font-size: 0.8rem; }
.btn-green { background: var(--green); color: #fff; }

/* HERO */
.hero {
  text-align: center;
  padding: 70px 24px 50px;
  background: radial-gradient(ellipse at 50% 0%, #1e1508 0%, transparent 70%);
}
.hero h1 { font-size: 2.8rem; color: var(--gold); margin-bottom: 12px; }
.hero p { color: var(--muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto 30px; }

/* FILTERS */
.filters {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 0 24px 30px;
}
.filter-btn {
  padding: 7px 18px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
}
.filter-btn.active, .filter-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(200,169,110,0.08);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  padding: 0 24px 60px;
  max-width: 1200px;
  margin: 0 auto;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
}
.card:hover { transform: translateY(-3px); border-color: var(--gold); }
.card-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  background: #222;
  display: block;
}
.card-img-placeholder {
  width: 100%;
  height: 180px;
  background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
}
.card-body { padding: 14px; }
.card-cat {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--gold);
  margin-bottom: 5px;
}
.card-name { font-size: 1.05rem; margin-bottom: 5px; }
.card-addr { font-size: 0.8rem; color: var(--muted); }
.card-registered {
  display: inline-block;
  margin-top: 8px;
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(200,169,110,0.15);
  color: var(--gold);
  border: 1px solid rgba(200,169,110,0.3);
}

/* MODALS */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
}
.overlay.open { display: flex; }
.modal {
  background: #111;
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 600px;
  margin: auto;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
}
.modal-header h2 { font-size: 1.2rem; color: var(--gold); }
.close-btn {
  background: none; border: none; color: var(--muted);
  font-size: 1.5rem; cursor: pointer; line-height: 1;
}
.close-btn:hover { color: var(--text); }
.modal-body { padding: 20px 24px; }

/* GALLERY */
.gallery { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px; }
.gallery img {
  height: 120px; min-width: 160px; object-fit: cover;
  border-radius: 8px; cursor: pointer;
}
.gallery img:first-child { min-width: 240px; height: 160px; }

/* INFO ROW */
.info-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.info-chip {
  display: flex; align-items: center; gap: 5px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 0.8rem;
  color: var(--muted);
  text-decoration: none;
}
.info-chip:hover { border-color: var(--gold); color: var(--gold); }

/* SERVICES */
.services-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.service-row {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
}
.service-name { font-size: 0.9rem; }
.service-meta { font-size: 0.8rem; color: var(--muted); }
.service-price { color: var(--gold); font-size: 0.9rem; }

/* HOURS */
.hours-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px; font-size: 0.82rem;
}
.hours-grid span:nth-child(odd) { color: var(--muted); }

/* FORMS */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 9px 12px;
  color: var(--text);
  font-size: 0.9rem;
  font-family: inherit;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--gold);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 10px;
}

/* AUTH MODAL */
.auth-divider {
  text-align: center; position: relative; margin: 16px 0;
  color: var(--muted); font-size: 0.8rem;
}
.auth-divider::before {
  content: '';
  position: absolute; top: 50%; left: 0; right: 0;
  height: 1px; background: var(--border); z-index: 0;
}
.auth-divider span {
  position: relative; z-index: 1; background: #111; padding: 0 10px;
}
.google-btn {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: #fff; color: #333;
  border: none; border-radius: 6px;
  padding: 10px;
  font-size: 0.95rem;
  cursor: pointer;
  font-weight: 500;
  transition: opacity 0.2s;
}
.google-btn:hover { opacity: 0.9; }
.google-btn svg { width: 20px; height: 20px; }
.auth-switch { text-align: center; margin-top: 14px; font-size: 0.85rem; color: var(--muted); }
.auth-switch a { color: var(--gold); cursor: pointer; text-decoration: none; }
.auth-switch a:hover { text-decoration: underline; }
.auth-error {
  background: rgba(229,57,53,0.15);
  border: 1px solid rgba(229,57,53,0.4);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 0.85rem;
  color: #ff8a80;
  margin-bottom: 12px;
  display: none;
}

/* USER MENU */
.user-avatar {
  width: 34px; height: 34px;
  background: var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #000; font-weight: bold; font-size: 0.9rem;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s;
}
.user-avatar:hover { border-color: var(--gold); }
.user-menu {
  position: absolute; top: 56px; right: 16px;
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 200px;
  z-index: 300;
  overflow: hidden;
  display: none;
}
.user-menu.open { display: block; }
.user-menu-item {
  padding: 11px 16px;
  cursor: pointer;
  font-size: 0.88rem;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.user-menu-item:last-child { border-bottom: none; }
.user-menu-item:hover { background: rgba(200,169,110,0.1); }
.user-menu-email { padding: 12px 16px; font-size: 0.78rem; color: var(--muted); border-bottom: 1px solid var(--border); }

/* ADMIN PANEL */
.admin-section {
  max-width: 1000px; margin: 0 auto;
  padding: 30px 24px;
  display: none;
}
.admin-section.visible { display: block; }
.admin-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px;
}
.admin-header h2 { font-size: 1.4rem; color: var(--gold); }
.admin-table {
  width: 100%; border-collapse: collapse;
  font-size: 0.85rem;
}
.admin-table th {
  padding: 10px 12px; text-align: left;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
  font-weight: normal;
  text-transform: uppercase;
  font-size: 0.72rem;
  letter-spacing: 1px;
}
.admin-table td {
  padding: 11px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.admin-table tr:hover td { background: rgba(255,255,255,0.02); }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.72rem;
}
.badge-gold { background: rgba(200,169,110,0.2); color: var(--gold); }
.badge-muted { background: rgba(136,136,136,0.15); color: var(--muted); }
.action-btns { display: flex; gap: 6px; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 18px;
  font-size: 0.88rem;
  z-index: 9999;
  animation: slideUp 0.25s ease;
  max-width: 300px;
  display: none;
}
.toast.show { display: block; }
.toast.success { border-color: var(--green); color: #81c784; }
.toast.error { border-color: var(--red); color: #e57373; }

/* LOADING */
.loading {
  text-align: center; padding: 60px 24px;
  color: var(--muted); font-size: 0.9rem;
}
.spinner {
  display: inline-block;
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 10px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* TABS */
.tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab {
  padding: 10px 18px;
  cursor: pointer;
  font-size: 0.88rem;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.2s;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* RESPONSIVE */
@media (max-width: 600px) {
  .hero h1 { font-size: 2rem; }
  .form-row { grid-template-columns: 1fr; }
  .admin-table th:nth-child(3),
  .admin-table td:nth-child(3) { display: none; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">solen.ch</div>
  <div class="nav-right">
    <button class="lang-btn active" onclick="setLang('de')">DE</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <div id="authArea"></div>
  </div>
</nav>
<div class="user-menu" id="userMenu"></div>

<!-- HERO -->
<div class="hero">
  <h1 id="heroTitle">Basel Beauty Booking</h1>
  <p id="heroSub">Entdecke die besten Salons, Barbershops und Nagelstudios in Basel.</p>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all')" id="f-all" data-de="Alle" data-en="All">Alle</button>
  <button class="filter-btn" onclick="setFilter('hair')" id="f-hair" data-de="Friseur" data-en="Hair">Friseur</button>
  <button class="filter-btn" onclick="setFilter('barber')" id="f-barber" data-de="Barbershop" data-en="Barber">Barbershop</button>
  <button class="filter-btn" onclick="setFilter('nails')" id="f-nails" data-de="Nägel" data-en="Nails">Nägel</button>
</div>

<!-- MAIN GRID -->
<div class="grid" id="storeGrid">
  <div class="loading"><span class="spinner"></span> <span id="loadingText">Lädt...</span></div>
</div>

<!-- ADMIN SECTION -->
<div class="admin-section" id="adminSection">
  <div class="admin-header">
    <h2 id="adminTitle">Admin Panel</h2>
    <button class="btn btn-gold" onclick="openStoreModal(null)">+ <span data-de="Geschäft hinzufügen" data-en="Add Store">Geschäft hinzufügen</span></button>
  </div>
  <table class="admin-table" id="adminTable">
    <thead>
      <tr>
        <th data-de="Name" data-en="Name">Name</th>
        <th data-de="Kategorie" data-en="Category">Kategorie</th>
        <th data-de="Status" data-en="Status">Status</th>
        <th data-de="Aktionen" data-en="Actions">Aktionen</th>
      </tr>
    </thead>
    <tbody id="adminTableBody"></tbody>
  </table>
</div>

<!-- STORE DETAIL MODAL -->
<div class="overlay" id="detailOverlay">
  <div class="modal" id="detailModal">
    <div class="modal-header">
      <h2 id="detailName"></h2>
      <button class="close-btn" onclick="closeDetail()">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-gold" id="bookBtn" onclick="openBooking()">
        <span data-de="Termin buchen" data-en="Book Appointment">Termin buchen</span>
      </button>
    </div>
  </div>
</div>

<!-- BOOKING MODAL -->
<div class="overlay" id="bookingOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="bookingTitle" data-de="Termin buchen" data-en="Book Appointment">Termin buchen</h2>
      <button class="close-btn" onclick="closeBooking()">×</button>
    </div>
    <div class="modal-body">
      <div id="bookingError" class="auth-error"></div>
      <div class="form-row">
        <div class="form-group">
          <label data-de="Dein Name" data-en="Your Name">Dein Name</label>
          <input type="text" id="bookName" placeholder="Max Mustermann">
        </div>
        <div class="form-group">
          <label data-de="E-Mail" data-en="Email">E-Mail</label>
          <input type="email" id="bookEmail" placeholder="max@example.com">
        </div>
      </div>
      <div class="form-group">
        <label data-de="Service" data-en="Service">Service</label>
        <select id="bookService"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-de="Datum" data-en="Date">Datum</label>
          <input type="date" id="bookDate">
        </div>
        <div class="form-group">
          <label data-de="Uhrzeit" data-en="Time">Uhrzeit</label>
          <select id="bookTime">
            <option>09:00</option><option>09:30</option><option>10:00</option>
            <option>10:30</option><option>11:00</option><option>11:30</option>
            <option>12:00</option><option>13:00</option><option>14:00</option>
            <option>14:30</option><option>15:00</option><option>15:30</option>
            <option>16:00</option><option>16:30</option><option>17:00</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeBooking()" data-de="Abbrechen" data-en="Cancel">Abbrechen</button>
      <button class="btn btn-gold" onclick="submitBooking()" data-de="Buchen" data-en="Book">Buchen</button>
    </div>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="overlay" id="authOverlay">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h2 id="authTitle">Anmelden</h2>
      <button class="close-btn" onclick="closeAuth()">×</button>
    </div>
    <div class="modal-body">
      <div id="authError" class="auth-error"></div>

      <!-- Google -->
      <button class="google-btn" onclick="loginGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Mit Google anmelden
      </button>

      <div class="auth-divider"><span>oder</span></div>

      <!-- Login form -->
      <div id="loginForm">
        <div class="form-group">
          <label>E-Mail</label>
          <input type="email" id="authEmail" placeholder="deine@email.com">
        </div>
        <div class="form-group">
          <label>Passwort</label>
          <input type="password" id="authPassword" placeholder="••••••••">
        </div>
        <button class="btn btn-gold" style="width:100%" onclick="loginEmail()" data-de="Anmelden" data-en="Sign In">Anmelden</button>
        <div class="auth-switch">
          <span data-de="Noch kein Konto?" data-en="No account yet?">Noch kein Konto?</span>
          <a onclick="showRegister()" data-de=" Registrieren" data-en=" Register"> Registrieren</a>
        </div>
      </div>

      <!-- Register form -->
      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label>E-Mail</label>
          <input type="email" id="regEmail" placeholder="deine@email.com">
        </div>
        <div class="form-group">
          <label>Passwort</label>
          <input type="password" id="regPassword" placeholder="••••••••">
        </div>
        <button class="btn btn-gold" style="width:100%" onclick="registerEmail()" data-de="Konto erstellen" data-en="Create Account">Konto erstellen</button>
        <div class="auth-switch">
          <span data-de="Schon ein Konto?" data-en="Already have an account?">Schon ein Konto?</span>
          <a onclick="showLogin()" data-de=" Anmelden" data-en=" Sign In"> Anmelden</a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- STORE EDITOR MODAL (Admin) -->
<div class="overlay" id="storeEditorOverlay">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <h2 id="storeEditorTitle">Geschäft bearbeiten</h2>
      <button class="close-btn" onclick="closeStoreEditor()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editStoreId">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('tabBasic',this)">Basis</div>
        <div class="tab" onclick="switchTab('tabServices',this)">Services</div>
        <div class="tab" onclick="switchTab('tabHours',this)">Öffnungszeiten</div>
        <div class="tab" onclick="switchTab('tabPhotos',this)">Fotos</div>
      </div>
      <!-- Basic Tab -->
      <div class="tab-content active" id="tabBasic">
        <div class="form-row">
          <div class="form-group">
            <label>Name *</label>
            <input type="text" id="eName" placeholder="Salon Name">
          </div>
          <div class="form-group">
            <label>Kategorie *</label>
            <select id="eCat">
              <option value="hair">Friseur</option>
              <option value="barber">Barbershop</option>
              <option value="nails">Nägel</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Adresse</label>
            <input type="text" id="eAddress" placeholder="Musterstrasse 1, 4051 Basel">
          </div>

const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvY2Zuc214bWR4a3JjbWp6emR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3ODA4OTcsImV4cCI6MjA4ODM1Njg5N30.8J2qPNlDW48UhCnPQSOigHQOV_uOxJtoXWmMW1LUaTc';

// ─── STATE ──────────────────────────────────────────────────────────────────
let lang = 'de';
let currentFilter = 'all';
let stores = [];
let currentStore = null;
let currentUser = null;
let isAdmin = false;
const DAYS_DE = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// ─── LANG ───────────────────────────────────────────────────────────────────
function setLang(l) {

// ─── AUTH ───────────────────────────────────────────────────────────────────
async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await handleSession(session);
  sb.auth.onAuthStateChange(async (event, session) => {
    if (session) await handleSession(session);
    else {
      currentUser = null; isAdmin = false;
      renderAuthArea();
      document.getElementById('adminSection').classList.remove('visible');
    }
  });
}

async function handleSession(session) {
  currentUser = session.user;
  // Check if admin
  const { data } = await sb.from('profiles').select('is_admin').eq('id', currentUser.id).single();
  isAdmin = data?.is_admin || false;
  // If admin not set yet but email matches
  if (!isAdmin && currentUser.email === 'habobi1238@proton.me') {
    await sb.from('profiles').upsert({ id: currentUser.id, email: currentUser.email, is_admin: true });
    isAdmin = true;
  }
  renderAuthArea();
  if (isAdmin) loadAdminTable();
}

function renderAuthArea() {
  const el = document.getElementById('authArea');
  if (currentUser) {
    const initials = (currentUser.email || 'U').charAt(0).toUpperCase();
    el.innerHTML = `<div class="user-avatar" onclick="toggleUserMenu()">${initials}</div>`;
    const menu = document.getElementById('userMenu');

      <div class="user-menu-email">${currentUser.email}</div>

}

function toggleAdmin() {
  document.getElementById('userMenu').classList.remove('open');

  document.getElementById('registerForm').style.display = 'block';
  document.getElementById('authTitle').textContent = lang === 'de' ? 'Registrieren' : 'Register';

async function loginGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });

}

async function loginEmail() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;

async function registerEmail() {
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!email || !password) return showAuthError('Bitte alle Felder ausfüllen');
  const { error } = await sb.auth.signUp({ email, password });

}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}

// ─── STORES ─────────────────────────────────────────────────────────────────
async function loadStores() {
  const { data, error } = await sb.from('stores').select('*').order('name');
  if (error) {
    document.getElementById('storeGrid').innerHTML = `<div class="loading">Fehler beim Laden</div>`;
    return;
  }
  stores = data || [];
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('storeGrid');
  const filtered = currentFilter === 'all' ? stores : stores.filter(s => s.cat === currentFilter);
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="loading" style="grid-column:1/-1">${lang === 'de' ? 'Keine Salons gefunden' : 'No salons found'}</div>`;
    return;
  }
  const icons = { hair: '✂️', barber: '💈', nails: '💅' };
  const catLabels = {
    hair: { de: 'Friseur', en: 'Hair Salon' },
    barber: { de: 'Barbershop', en: 'Barbershop' },
    nails: { de: 'Nagelstudio', en: 'Nail Studio' }
  };
  grid.innerHTML = filtered.map(s => {
    const img = s.photos && s.photos.length > 0
      ? `<img class="card-img" src="${s.photos[0]}" alt="${s.name}" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="card-img-placeholder">${icons[s.cat] || '🏠'}</div>`;
    return `
      <div class="card" onclick="openDetail(${s.id})">
        ${img}
        <div class="card-body">
          <div class="card-cat">${catLabels[s.cat]?.[lang] || s.cat}</div>
          <div class="card-name">${s.name}</div>
          ${s.address ? `<div class="card-addr">📍 ${s.address}</div>` : ''}
          ${s.registered ? `<span class="card-registered">${lang === 'de' ? '✓ Online buchbar' : '✓ Online booking'}</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('f-' + f)?.classList.add('active');
  renderGrid();
}

// ─── DETAIL ──────────────────────────────────────────────────────────────────
function openDetail(id) {
  currentStore = stores.find(s => s.id === id);
  if (!currentStore) return;
  document.getElementById('detailName').textContent = currentStore.name;
  const body = document.getElementById('detailBody');
  const s = currentStore;

  // Gallery
  let gallery = '';
  if (s.photos && s.photos.length > 0) {
    gallery = `<div class="gallery">${s.photos.map(p => `<img src="${p}" alt="foto" onclick="window.open('${p}')" onerror="this.style.display='none'">`).join('')}</div>`;
  }

  // Description
  const desc = lang === 'en' && s.description_en ? s.description_en : (s.description || '');

  // Info chips
  let chips = '<div class="info-row">';
  if (s.address) chips += `<a class="info-chip" href="https://maps.google.com/?q=${encodeURIComponent(s.address)}" target="_blank">📍 ${s.address}</a>`;
  if (s.phone) chips += `<a class="info-chip" href="tel:${s.phone}">📞 ${s.phone}</a>`;
  if (s.website) chips += `<a class="info-chip" href="${s.website}" target="_blank">🌐 Website</a>`;
  if (s.insta) chips += `<a class="info-chip" href="https://instagram.com/${s.insta.replace('@','')}" target="_blank">📸 ${s.insta}</a>`;
  chips += '</div>';

  // Services
  let servicesHtml = '';
  if (s.services && s.services.length > 0) {
    servicesHtml = `<h3 style="font-size:0.9rem;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">${lang === 'de' ? 'Services' : 'Services'}</h3>
    <div class="services-grid">${s.services.map(sv => `
      <div class="service-row">
        <div>
          <div class="service-name">${lang === 'en' && sv.nameEN ? sv.nameEN : sv.name}</div>
          <div class="service-meta">${sv.duration || ''}</div>
        </div>
        <div class="service-price">${sv.price || ''}</div>
      </div>`).join('')}</div>`;
  }

  // Hours
  let hoursHtml = '';
  if (s.hours && Object.keys(s.hours).length > 0) {
    const days = lang === 'de' ? DAYS_LABELS_DE : DAYS_LABELS_EN;
    hoursHtml = `<h3 style="font-size:0.9rem;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;margin-top:16px">${lang === 'de' ? 'Öffnungszeiten' : 'Opening Hours'}</h3>
    <div class="hours-grid">`;
    const keys = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const labels = lang === 'de' ? ['Mo','Di','Mi','Do','Fr','Sa','So'] : ['Mo','Tu','We','Th','Fr','Sa','Su'];
    keys.forEach((k, i) => {
      hoursHtml += `<span>${labels[i]}</span><span>${s.hours[k] || (lang === 'de' ? 'Geschlossen' : 'Closed')}</span>`;
    });
    hoursHtml += '</div>';
  }

  body.innerHTML = gallery + chips + (desc ? `<p style="font-size:0.88rem;color:var(--muted);margin-bottom:16px;line-height:1.6">${desc}</p>` : '') + servicesHtml + hoursHtml;

  document.getElementById('bookBtn').style.display = s.registered ? 'block' : 'none';
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }

// ─── BOOKING ─────────────────────────────────────────────────────────────────
function openBooking() {
  if (!currentStore) return;
  closeDetail();
  document.getElementById('bookingTitle').textContent = currentStore.name + ' — ' + (lang === 'de' ? 'Termin' : 'Appointment');
  document.getElementById('bookingError').style.display = 'none';

  // Prefill from logged in user
  if (currentUser) {
    document.getElementById('bookEmail').value = currentUser.email || '';
  }

  // Set min date to today
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('bookDate').min = today;
  document.getElementById('bookDate').value = today;

  // Services
  const sel = document.getElementById('bookService');
  sel.innerHTML = '';
  if (currentStore.services && currentStore.services.length > 0) {
    currentStore.services.forEach(sv => {
      const opt = document.createElement('option');
      opt.value = sv.name;
      opt.textContent = (lang === 'en' && sv.nameEN ? sv.nameEN : sv.name) + (sv.price ? ' — ' + sv.price : '');
      sel.appendChild(opt);
    });
  } else {
    sel.innerHTML = '<option>Allgemeine Buchung</option>';
  }

  document.getElementById('bookingOverlay').classList.add('open');
}

function closeBooking() { document.getElementById('bookingOverlay').classList.remove('open'); }

async function submitBooking() {
  const name = document.getElementById('bookName').value.trim();
  const email = document.getElementById('bookEmail').value.trim();
  const service = document.getElementById('bookService').value;
  const date = document.getElementById('bookDate').value;
  const time = document.getElementById('bookTime').value;

  if (!name || !email || !date) {
    document.getElementById('bookingError').textContent = lang === 'de' ? 'Bitte alle Pflichtfelder ausfüllen.' : 'Please fill in all required fields.';
    document.getElementById('bookingError').style.display = 'block';
    return;
  }

  const { error } = await sb.from('bookings').insert({
    store_id: currentStore.id,
    store_name: currentStore.name,
    customer_name: name,
    customer_email: email,
    service_name: service,
    booking_date: date,
    booking_time: time,
    status: 'pending'
  });

  if (error) {
    document.getElementById('bookingError').textContent = error.message;
    document.getElementById('bookingError').style.display = 'block';
    return;
  }

  // Send email notification
  try {
    await fetch('/api/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        customerName: name,
        customerEmail: email,
        salonName: currentStore.name,
        salonEmail: currentStore.owner_email || 'noreply@solen.ch',
        serviceName: service,
        bookingDate: date,
        bookingTime: time
      })
    });
  } catch(e) { console.log('Email send failed:', e); }

  closeBooking();
  showToast(lang === 'de' ? '🎉 Termin gebucht!' : '🎉 Appointment booked!', 'success');
}

// ─── ADMIN TABLE ─────────────────────────────────────────────────────────────
async function loadAdminTable() {
  const { data } = await sb.from('stores').select('*').order('name');
  stores = data || [];
  renderGrid();
  const tbody = document.getElementById('adminTableBody');
  tbody.innerHTML = stores.map(s => `
    <tr>
      <td>${s.name}</td>
      <td>${s.cat}</td>
      <td><span class="badge ${s.registered ? 'badge-gold' : 'badge-muted'}">${s.registered ? (lang === 'de' ? 'Registriert' : 'Registered') : (lang === 'de' ? 'Nicht registriert' : 'Not registered')}</span></td>
      <td>
        <div class="action-btns">
          <button class="btn btn-sm btn-outline" onclick="openStoreModal(${s.id})">${lang === 'de' ? 'Bearbeiten' : 'Edit'}</button>
          <button class="btn btn-sm btn-danger" onclick="deleteStore(${s.id})">${lang === 'de' ? 'Löschen' : 'Delete'}</button>
        </div>
      </td>
    </tr>`).join('');
}

async function deleteStore(id) {
  if (!confirm(lang === 'de' ? 'Wirklich löschen?' : 'Really delete?')) return;
  const { error } = await sb.from('stores').delete().eq('id', id);
  if (error) { showToast(error.message, 'error'); return; }
  showToast(lang === 'de' ? 'Gelöscht!' : 'Deleted!', 'success');
  loadAdminTable();
}

// ─── STORE EDITOR ────────────────────────────────────────────────────────────
function openStoreModal(id) {
  document.getElementById('userMenu').classList.remove('open');
  const overlay = document.getElementById('storeEditorOverlay');
  // Reset to first tab
  switchTab('tabBasic', document.querySelector('#storeEditorOverlay .tab'));

  if (id === null) {
    // New store
    document.getElementById('storeEditorTitle').textContent = lang === 'de' ? 'Neues Geschäft' : 'New Store';
    document.getElementById('editStoreId').value = '';
    document.getElementById('eName').value = '';
    document.getElementById('eCat').value = 'hair';
    document.getElementById('eAddress').value = '';
    document.getElementById('ePhone').value = '';
    document.getElementById('eWebsite').value = '';
    document.getElementById('eInsta').value = '';
    document.getElementById('eDesc').value = '';
    document.getElementById('eDescEn').value = '';
    document.getElementById('eOwnerEmail').value = '';
    document.getElementById('eRegistered').checked = false;
    document.getElementById('ePhotos').value = '';
    renderServiceRows([]);
    renderHourRows({});
  } else {
    const s = stores.find(x => x.id === id);
    if (!s) return;
    document.getElementById('storeEditorTitle').textContent = lang === 'de' ? 'Geschäft bearbeiten' : 'Edit Store';
    document.getElementById('editStoreId').value = s.id;
    document.getElementById('eName').value = s.name || '';
    document.getElementById('eCat').value = s.cat || 'hair';
    document.getElementById('eAddress').value = s.address || '';
    document.getElementById('ePhone').value = s.phone || '';
    document.getElementById('eWebsite').value = s.website || '';
    document.getElementById('eInsta').value = s.insta || '';
    document.getElementById('eDesc').value = s.description || '';
    document.getElementById('eDescEn').value = s.description_en || '';
    document.getElementById('eOwnerEmail').value = s.owner_email || '';
    document.getElementById('eRegistered').checked = s.registered || false;
    document.getElementById('ePhotos').value = (s.photos || []).join('\n');
    renderServiceRows(s.services || []);
    renderHourRows(s.hours || {});
  }
  overlay.classList.add('open');
}

function closeStoreEditor() { document.getElementById('storeEditorOverlay').classList.remove('open'); }

function renderServiceRows(services) {
  const list = document.getElementById('servicesList');
  list.innerHTML = services.map((sv, i) => serviceRowHtml(i, sv)).join('');
}

function serviceRowHtml(i, sv = {}) {
  return `<div class="form-row" style="margin-bottom:8px" id="srow${i}">
    <div class="form-group" style="margin:0"><input type="text" placeholder="Name DE" value="${sv.name||''}" class="sname" data-i="${i}"></div>
    <div class="form-group" style="margin:0"><input type="text" placeholder="Name EN" value="${sv.nameEN||''}" class="snameEN" data-i="${i}"></div>
    <div class="form-group" style="margin:0"><input type="text" placeholder="Dauer" value="${sv.duration||''}" class="sduration" data-i="${i}"></div>
    <div class="form-group" style="margin:0"><input type="text" placeholder="Preis" value="${sv.price||''}" class="sprice" data-i="${i}"></div>
    <button class="btn btn-sm btn-danger" style="align-self:flex-end" onclick="this.parentElement.remove()">×</button>
  </div>`;
}

function addServiceRow() {
  const list = document.getElementById('servicesList');
  const i = Date.now();
  const div = document.createElement('div');
  div.innerHTML = serviceRowHtml(i);
  list.appendChild(div.firstElementChild);
}

function getServicesFromForm() {
  const rows = document.querySelectorAll('#servicesList .form-row');
  return Array.from(rows).map(row => ({
    name: row.querySelector('.sname')?.value || '',
    nameEN: row.querySelector('.snameEN')?.value || '',
    duration: row.querySelector('.sduration')?.value || '',
    price: row.querySelector('.sprice')?.value || ''
  })).filter(s => s.name);
}

function renderHourRows(hours) {
  const list = document.getElementById('hoursList');
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const labels = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
  list.innerHTML = days.map((d, i) => `
    <div class="form-row" style="align-items:center;margin-bottom:8px">
      <div style="font-size:0.85rem;color:var(--muted);padding-top:8px">${labels[i]}</div>
      <div class="form-group" style="margin:0">
        <input type="text" class="hday" data-day="${d}" placeholder="09:00-19:00 oder Geschlossen" value="${hours[d]||''}">
      </div>
    </div>`).join('');
}

function getHoursFromForm() {
  const hours = {};
  document.querySelectorAll('.hday').forEach(inp => {
    if (inp.value.trim()) hours[inp.dataset.day] = inp.value.trim();
  });
  return hours;
}

async function saveStore() {
  const id = document.getElementById('editStoreId').value;
  const data = {
    name: document.getElementById('eName').value.trim(),
    cat: document.getElementById('eCat').value,
    address: document.getElementById('eAddress').value.trim(),
    phone: document.getElementById('ePhone').value.trim(),
    website: document.getElementById('eWebsite').value.trim(),
    insta: document.getElementById('eInsta').value.trim(),
    description: document.getElementById('eDesc').value.trim(),
    description_en: document.getElementById('eDescEn').value.trim(),
    owner_email: document.getElementById('eOwnerEmail').value.trim(),
    registered: document.getElementById('eRegistered').checked,
    services: getServicesFromForm(),
    hours: getHoursFromForm(),
    photos: document.getElementById('ePhotos').value.split('\n').map(s => s.trim()).filter(Boolean)
  };

  if (!data.name) { showToast(lang === 'de' ? 'Name ist Pflicht' : 'Name is required', 'error'); return; }

  let error;
  if (id) {
    ({ error } = await sb.from('stores').update(data).eq('id', id));
  } else {
    ({ error } = await sb.from('stores').insert(data));
  }

  if (error) { showToast(error.message, 'error'); return; }
  closeStoreEditor();
  showToast(lang === 'de' ? '✓ Gespeichert!' : '✓ Saved!', 'success');
  loadAdminTable();
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(tabId, el) {
  document.querySelectorAll('#storeEditorOverlay .tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('#storeEditorOverlay .tab-content').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById(tabId)?.classList.add('active');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ─── CLOSE ON OVERLAY CLICK ──────────────────────────────────────────────────
['detailOverlay','bookingOverlay','authOverlay','storeEditorOverlay'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) document.getElementById(id).classList.remove('open');
  });
});

// ─── INIT ────────────────────────────────────────────────────────────────────
initAuth();
loadStores();
</script>
</body>
